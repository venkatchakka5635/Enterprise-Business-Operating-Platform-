server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ebop-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ebop}
    username: ${DB_USERNAME:ebop}
    password: ${DB_PASSWORD:ebop}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:ebop-super-secret-key-change-in-production-min-32-chars}
  expiration: ${JWT_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,flyway
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
    com.example.bop: INFO
  pattern:
    console: '%d{ISO8601} [%t] %-5p %c{1} - %m%n'
