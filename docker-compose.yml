version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ebop-postgres
    environment:
      POSTGRES_DB: ebop
      POSTGRES_USER: ebop
      POSTGRES_PASSWORD: ebop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebop"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ebop-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ebop
      DB_USERNAME: ebop
      DB_PASSWORD: ebop
      JWT_SECRET: ebop-super-secret-key-change-in-production-min-32-chars
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./bop
      dockerfile: Dockerfile
    container_name: ebop-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
